# This file contains common pin mappings for the Fysetc Spider H7 board.
# To use this config, the firmware should be compiled for the STM32H723.
# When calling "menuconfig", enable "extra low-level configuration setup"
# and select the "25MHz crystal" as clock reference
# For flashing, No bootloader, write the compiled klipper.bin to memory location 0x08000000

# See docs/Config_Reference.md for a description of parameters.

## Voron Design VORON2 250/300/350mm Spider TMC2209 UART config

## *** THINGS TO CHANGE/CHECK: ***
## MCU paths                           [mcu] section
## Thermistor types                    [extruder] and [heater_bed] sections - See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types
## Bed sensor_pin                      [heater_bed] section
## Fan pins                            [heater_fan hotend_fan] amd [fan] sections
## Z Endstop Switch location           [safe_z_home] section
## Homing end position                 [gcode_macro G32] section
## Z Endstop Switch  offset for Z0     [stepper_z] section
## Probe points                        [quad_gantry_level] section
## Min & Max gantry corner postions    [quad_gantry_level] section
## PID tune                            [extruder] and [heater_bed] sections
## Fine tune E steps                   [extruder] section

#MAIN SETUP#
#[include fluidd.cfg]
[include mainsail.cfg]
[include macros.cfg]
#[include led.cfg]
#[include lcd_tweaks.cfg]
#[include DisplayMenu.cfg]
[include stealthburner_leds.cfg]
[include config_backup.cfg]
[include touch_test.cfg]
[include mega_dump.cfg]

#ADXL SETUP#
#[include adxl.cfg]

[danger_options]
minimal_logging:            True
log_velocity_limit_changes: False
autosave_includes:          True

[telemetry]
enabled: False

[mcu]
##  Obtain definition by "ls -l /dev/serial/by-id/" 
##--------------------------------------------------------------------
#serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_40001B000551303439343636-if00
canbus_uuid=10461946b662
## Uncomment below if you're using the Raspberry uart0 to communicate with Spider
#restart_method: command

[mcu sb_can_th]
# serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_230037000757435433353320-if00
# restart_method: command # Not needed for probes using CAN.
canbus_uuid=2dfa7c38560e

#[mcu ERB]
#serial: /dev/serial/by-id/usb-Klipper_rp2040_E66160F4238E7F37-if00

[mcu cartographer] # See https://www.klipper3d.org/Config_Reference.html#mcu
# Remove either the serial or canbus_uuid line dependant on your setup.
# serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_690047000550315551333620-if00
# restart_method: command # Not needed for probes using CAN. 
#canbus_uuid=1106948404b0
canbus_uuid=64b6935511d7

[printer]
kinematics: corexy
max_velocity: 500  
max_accel: 5000             #Max 4000
max_z_velocity: 15          #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

[virtual_sdcard]
path: ~/printer_data/gcodes
[display_status]
[pause_resume]

[skew_correction]

[exclude_object]

[axis_twist_compensation]
speed: 50
#   The speed (in mm/s) of non-probing moves during the calibration.
#   The default is 50.
#horizontal_move_z: 5
#   The height (in mm) that the head should be commanded to move to
#   just prior to starting a probe operation. The default is 5.
calibrate_start_x: 20
#   Defines the minimum X coordinate of the calibration
#   This should be the X coordinate that positions the nozzle at the starting
#   calibration position.
calibrate_end_x: 200
#   Defines the maximum X coordinate of the calibration
#   This should be the X coordinate that positions the nozzle at the ending
#   calibration position.
calibrate_y: 112.5
#   Defines the Y coordinate of the calibration
#   This should be the Y coordinate that positions the nozzle during the
#   calibration process. This parameter is recommended to
#   be near the center of the bed

#####################################################################
#      X/Y Stepper Settings
#####################################################################
##  Connected to X-MOT (B Motor)
[stepper_x]
step_pin: PE11
dir_pin: PE10
enable_pin: !PE9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200     # set to 400 for 0.9 degree stepper
endstop_pin: ^PA1 				# X-
position_min: 0
##  Uncomment for 300mm build
position_endstop: 300
position_max: 300
homing_speed: 100   #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##  Make sure to update below for your relevant driver (2208 or 2209)

[tmc2209 stepper_x]
uart_pin: PE7
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# [tmc5160 stepper_x]
# cs_pin: PE7
# # Soft SPI
# spi_software_mosi_pin: PE14
# spi_software_miso_pin: PE13
# spi_software_sclk_pin: PE12
# interpolate: True
# #diag0_pin: PB14 # For QHV5160 V1.x
# #diag1_pin: PB14 # For QHV5160 V2.0
# run_current: 1.0
# #hold_current: 0.5
# #stealthchop_threshold: 0

##  Connected to Y-MOT (A Motor)
[stepper_y]
step_pin: PD8
dir_pin: PB12
enable_pin: !PD9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200  # set to 400 for 0.9 degree stepper
endstop_pin: ^PA2			 # Y-
position_min: 0
##  Uncomment for 300mm build
position_endstop: 304
position_max: 304
homing_speed: 100  #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_y]
uart_pin: PE15
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# [tmc5160 stepper_y]
# cs_pin: PE15
# # Soft SPI
# spi_software_mosi_pin: PE14
# spi_software_miso_pin: PE13
# spi_software_sclk_pin: PE12
# #diag0_pin: PB13   # For QHV5160 V1.x
# #diag1_pin: PB13   # For QHV5160 V2.0
# interpolate: True
# run_current: 1.0
# #hold_current: 0.5
# #stealthchop_threshold: 0

#####################################################################
#   Z Stepper Settings
#####################################################################

## In Z-MOT Position
## Z0 Stepper - Front Left
[stepper_z]
step_pin: PD14
dir_pin: !PD13
enable_pin: !PD15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
##  In Z- Position
endstop_pin: probe:z_virtual_endstop
#endstop_pin: ^PA0
##  Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
##  (+) value = endstop above Z0, (-) value = endstop below
##  Increasing position_endstop brings nozzle closer to the bed
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop: 0
##  Uncomment below for 300mm build
position_max: 270
position_min: -2
homing_speed: 10
second_homing_speed: 3
homing_retract_dist: 0

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PD10
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  In E1-MOT Position
##  Z1 Stepper - Rear Left
[stepper_z1]
step_pin: PD5
dir_pin: PD6
enable_pin: !PD4
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PD7
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  In E2-MOT Position
##  Z2 Stepper - Rear Right
[stepper_z2]
step_pin: PE6
dir_pin: !PC13
enable_pin: !PE5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PC14
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  In E3-MOT Position
##  Z3 Stepper - Front Right
[stepper_z3]
step_pin: PE2
dir_pin: PE4
enable_pin: !PE3
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z3]
uart_pin: PC15
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Extruder
#####################################################################

##  In E0-MOT Position
[extruder]
step_pin: sb_can_th:PB3
dir_pin: !sb_can_th:PA8 
enable_pin: !sb_can_th:PA15

##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point for Bondtech 5mm gears
##  34.37086 for Bondtech 8mm gears (Galileo)
rotation_distance: 23.09851169535 #21.998582567 ##22.6789511   #Bondtech 5mm Drive Gears
##  Update Gear Ratio depending on your Extruder Type
##  Use 50:17 for Afterburner/Clockwork (BMG Gear Ratio)
##  Use 80:20 for M4, M3.1
##  Use 7.5:1 for Galileo
gear_ratio: 50:10               #BMG Gear Ratio
microsteps: 32
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400

##      In E0 OUT Position
heater_pin: sb_can_th:PC15
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: sb_can_th:PA6

# control: mpc
# heater_power: 40  
# cooling_fan: fan
filament_diameter: 1.75
# filament_density: 1.20
# filament_heat_capacity: 1.8

min_temp: 0
max_temp: 300
max_power: 1.0
min_extrude_temp: 170
max_extrude_only_distance: 200
max_extrude_cross_section: 50
#control = pid
#pid_kp = 26.213
#pid_ki = 1.304
#pid_kd = 131.721
##  Try to keep pressure_advance below 1.0
pressure_advance: 0.04
##  Default is 0.040, leave stock
pressure_advance_smooth_time: 0.040

##  In E0-MOT Position
##  Make sure to update below for your relevant driver (2208 or 2209)
# [tmc2209 extruder]
# uart_pin: PD7
# interpolate: false
# run_current: 0.5
# sense_resistor: 0.110
# stealthchop_threshold: 0
[tmc2209 extruder]
uart_pin: sb_can_th:PA10
tx_pin: sb_can_th:PA9
interpolate: false
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0
##diag_pin: sb_can_th:PB5

#####################################################################
#	Arc Control
#####################################################################

[gcode_arcs]
resolution: 0.5
#   An arc will be split into segments. Each segment's length will
#   equal the resolution in mm set above. Lower values will produce a
#   finer arc, but also more work for your machine. Arcs smaller than
#   the configured value will become straight lines. The default is
#   1mm.


#####################################################################
#	Bed Heater
#####################################################################
##  SSR Pin - In BED OUT position
[heater_bed]
heater_pin: PB4
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
## Use "Generic 3950" for Keenovo heaters
sensor_type: Generic 3950
sensor_pin: PB0 # Spider 2.3
##  Adjust Max Power so your heater doesn't warp your bed
max_power: 1.0
min_temp: 0
max_temp: 120
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769

#####################################################################
#   Probe/Carto
#####################################################################
[cartographer]
mcu: cartographer
x_offset: 0 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 21.0 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: yes # For extra output

##  This probe is not used for Z height, only Quad Gantry Leveling
##  In Z+ position
# [probe]
# ##  If your probe is NO instead of NC, change pin to ^!PA3
# pin: ^!PA3
# x_offset: 0
# y_offset: 40.0
# #z_offset: 0.750
# speed: 10.0
# samples: 3
# samples_result: median
# sample_retract_dist: 3.0
# samples_tolerance: 0.0075
# samples_tolerance_retries: 3

#####################################################################
#   Fan Control
#####################################################################

##  Hotend Fan - FAN1 Connector
[heater_fan hotend_fan]
pin: sb_can_th:PB7
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
##  If you are experiencing back flow, you can reduce fan_speed
#fan_speed: 1.0
# [heater_fan hotend_fan]
# pin: PA14  # Spider 2.3
# max_power: 1.0
# kick_start_time: 0.5
# heater: extruder
# heater_temp: 50.0
# ##  If you are experiencing back flow, you can reduce fan_speed
# #fan_speed: 1.0

##  Print Cooling Fan - FAN0 Connector
#  Print Cooling Fan
[fan]
pin: sb_can_th:PB0  # Super8 IN7
max_power: 1.0
kick_start_time: 0.5
# off_below: 0.10
cycle_time: 0.002
hardware_pwm: false
shutdown_speed: 0
# tachometer_pin: PG10
# tachometer_ppr: 1
# tachometer_poll_interval: 0.00
# [fan]
# pin: PA13  # Spider 2.3
# max_power: 1.0
# kick_start_time: 0.5
# ##  Depending on your fan, you may need to increase this value
# ##  if your fan will not start. Can change cycle_time (increase)
# ##  if your fan is not able to slow down effectively
# off_below: 0.10

##  Controller fan x2 - In E1 OUT Positon
[heater_fan controller_fan]
pin: PC8
max_power: 1.0
shutdown_speed: 1.0
kick_start_time: 0.5
heater: heater_bed
heater_temp: 50.0
fan_speed: 0.6

##  OrangePi fan - RGB (G) Connector
#[heater_fan orangepi_fan]
#pin: PB5
#max_power: 1.0
#shutdown_speed: 1.0
#kick_start_time: 0.5
#heater: heater_bed
#heater_temp: 30.0
#fan_speed: 1.0

[temperature_fan RPI_Fan]
pin: PA13
max_power: 1.0
min_temp: 10
max_temp: 100
target_temp: 50.0
kick_start_time: 0.5
control: watermark
sensor_type: temperature_host
#fan_speed: 1.0

# [temperature_fan opi_Fan]
# pin: PB5
# max_power: 1.0
# min_temp: 10
# max_temp: 100
# target_temp: 60.0
# kick_start_time: 0.5
# off_below: 0.1
# control: watermark
# sensor_type: temperature_host
# fan_speed: 1.0

[output_pin nevermore]
pin: PA14
value: 0
shutdown_value: 0

#####################################################################
#   LED Control
#####################################################################

##  Chamber Lighting - In E2 OUT Position
[output_pin caselight]
pin: PB3
pwm: true
shutdown_value: 0
value:0.25
cycle_time: 0.001

# [neopixel ext_leds]
# pin: PA2 #on the AUX board RGB
# chain_count: 7
# color_order: GRB
# initial_RED: 1.0 #0.5
# initial_GREEN: 0.0
# initial_BLUE: 0.0 #0.5
# #initial_WHITE: 0.5 #0.5

#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 3600

[safe_z_home]
##  XY Location of the Z Endstop Switch
##  Update -10,-10 to the XY coordinates of your endstop pin 
##  (such as 157,305) after going through Z Endstop Pin
##  Location Definition step.
home_xy_position: 150,150
speed: 300
z_hop: 5

##  Use QUAD_GANTRY_LEVEL to level a gantry.
##  Min & Max gantry corners - measure from nozzle at MIN (0,0) and 
##  MAX (250, 250), (300,300), or (350,350) depending on your printer size
##  to respective belt positions

[quad_gantry_level]
    
##  Gantry Corners for 300mm Build
##  Uncomment for 300mm build
gantry_corners:
   -60,-10
   360,370
##  Probe points
points:
   25,10
   25,240
   275,240
   275,10

speed: 300
horizontal_move_z: 3
retries: 5
retry_tolerance: 0.0025
max_adjust: 10

[bed_mesh]
zero_reference_position: 150, 150 # The centre of your bed.
mesh_min: 20, 21.0
mesh_max: 280, 259
probe_count: 20, 20
speed: 300
horizontal_move_z: 3
adaptive_margin: 10
mesh_pps: 0,0 # Disable interpolation - mesh is probably dense enough
algorithm: bicubic # algorithm model
bicubic_tension: 0.2

# [bed_mesh]
# speed: 200
# horizontal_move_z: 5
# mesh_min: 20, 40 # Minimum calibration point coordinates x, y
# mesh_max: 280,240 # Maximum calibration point coordinates x, y
# fade_start: 0.6 # Start phasing out the adjusted Z height. Before starting the fade process, it's best to reduce a few layers
# fade_end: 10.0 # This value can be adjusted according to how curved the print surface is
# fade_target: 0 # can be thought of as an additional Z offset applied to the entire bed after the fade is complete
# probe_count: 5,5 # The number of sampling points (5X5 is 25 points)
# algorithm: bicubic # algorithm model
# #relative_reference_index: 12 # Relative reference index

####################################################################################
#							Chamber temperature									   
####################################################################################

[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: PC2
min_temp: 0
max_temp: 100
gcode_id: C

####################################################################################
#							Pi & MCU Temperature
####################################################################################

[temperature_sensor SpiderH7 MCU]
sensor_type: temperature_mcu
sensor_mcu: mcu
min_temp: 0
max_temp: 100

[temperature_sensor _RPI]    # The temperature of the upper computer
sensor_type: temperature_host 
min_temp: 0
max_temp: 75

[temperature_sensor CAN_MCU_Temp]
sensor_type: temperature_mcu
sensor_mcu: sb_can_th
min_temp: 0
max_temp: 105

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 0
max_temp: 105

[cartographer coil]
name: cartographer_coil
#   The name of the coil temperature sensor.
#   The default is 'cartographer_coil'.
min_temp: 0
#   The minimum temperature of the coil, below this will trigger a warning.
#   The default is 0.
max_temp: 105
#   The maximum temperature of the coil, above this will trigger a warning.
#   The default is 105.

#####################################################################
#   ADXL/WADXL
#####################################################################
# [wadxl]
# ip = 192.168.1.109

# [resonance_tester]
# probe_points = 150, 150, 20
# accel_chip = wadxl
# accel_per_hz = 160
# min_freq = 20
# max_freq = 120
# sweeping_accel: 400
# sweeping_period: 0

[adxl345]
# Select 1 of the cs_pin below depending on the probe you have. 
# Having the wrong one selected will cause an Endless Bootloop
# Cartographer V4 has int2 connected to the probes PA1 pin
#cs_pin: cartographer:PA3 # For Cartographer V3
cs_pin: cartographer:PA0 # For Cartographer V4
spi_bus: spi1
axes_map: y, -x, z

[resonance_tester]
accel_chip: adxl345
probe_points:
    150, 150, 20 # Fill out the blank with x and y coordinates where you want to run the resonance test.
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0

[input_shaper]
shaper_freq_x: 59.6 # center frequency for the X axis filter
shaper_type_x: mzv # filter type for the X axis
shaper_freq_y: 44.2 # center frequency for the Y axis filter
shaper_type_y: mzv # filter type for the Y axis
damping_ratio_x: 0.050 # damping ratio for the X axis
damping_ratio_y: 0.043 # damping ratio for the Y axis

[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
#    Path where the processed results will be stored. If the folder doesn't exist,
#    it will be automatically created. You can change this if you'd like to store 
#    results in a different location.
number_of_results_to_keep: 10
#    This setting defines how many results you want to keep in the result folder.
#    Once the specified number is exceeded, older results will be automatically deleted
#    to free up space on the SD card and avoid cluttering the results folder.
keep_raw_data: False
#    If set to True, Shake&Tune will store both the processed graphs and the raw accelerometer
#    .stdata files in the results folder. This can be useful for debugging or archiving purposes.
#    Please always attach them when reporting any issues on GitHub or Discord.
show_macros_in_webui: True
#    Mainsail and Fluidd doesn't create buttons for system commands (macros that are not part
#    of the printer.cfg file). This option allow Shake&Tune to inject them into the webui at runtime.
#    If set to False, the macros will be hidden but still accessible from the console by typing
#    their names manually, which can be useful if you prefer to encapsulate them into your own macros.
timeout: 600
#    This defines the maximum processing time (in seconds) to allows to Shake&Tune for generating 
#    graphs from a .stdata file. 10 minutes should be more than enough in most cases, but if you have
#    slower hardware (e.g., older SD cards or low-performance devices), increase it to prevent timeouts.
measurements_chunk_size: 2
#    Each Shake&Tune command uses the accelerometer to take multiple measurements. By default,
#    Shake&Tune will write a chunk of data to disk every two measurements, and at the end of the
#    command will merge these chunks into the final .stdata file for processing. "2" is a very
#    conservative setting to avoid Klipper Timer Too Close errors on lower end devices with little
#    RAM, and should work for everyone. However, if you are using a powerful computer, you may
#    wish to increase this value to keep more measurements in memory (e.g., 15-20) before writing
#    the chunk and avoid stressing the filesystem too much.
max_freq: 120
#    This setting defines the maximum frequency at which the calculation of the power spectral density
#    is cutoff. The default value should be fine for most machines and accelerometer combinations and
#    avoid touching it unless you know what you're doing.
dpi: 300
#    Controls the resolution of the generated graphs. The default value of 300 dpi was optimized
#    and strikes a balance between performance and readability, ensuring that graphs are clear
#    without using too much RAM to generate them. Usually, you shouldn't need to change this value.

